<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product Card Design</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background-color: #f5f5f5;
      padding: 20px;
    }

    .product-card {
      background-color: white;
      border-radius: 8px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      overflow: hidden;
      max-width: 300px;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .product-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
    }

    .product-image {
      width: 100%;
      height: 250px;
      object-fit: cover;
    }

    .product-details {
      padding: 20px;
    }

    .product-title {
      font-size: 20px;
      font-weight: bold;
      color: #333;
      margin-bottom: 10px;
    }

    .product-description {
      font-size: 14px;
      color: #666;
      margin-bottom: 15px;
    }

    .product-price {
      font-size: 24px;
      font-weight: bold;
      color: #27ae60;
      margin-bottom: 15px;
    }

    .btn-add-to-cart {
      width: 100%;
      padding: 12px;
      background-color: #3498db;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    .btn-add-to-cart:hover {
      background-color: #2980b9;
    }

    .container {
      display: flex;
      justify-content: center;
      gap: 30px;
      flex-wrap: wrap;
    }
  </style>
</head>
<body>
  <h1 style="text-align: center; margin-bottom: 40px; color: #333;">Product Cards</h1>

  <div class="container">
    <!-- Product Card 1: External CSS -->
    <div class="product-card">
      <img 
        src="https://via.placeholder.com/300x250?text=Laptop" 
        alt="Laptop" 
        class="product-image"
      />
      <div class="product-details">
        <div class="product-title">Laptop</div>
        <div class="product-description">High-performance laptop with 16GB RAM</div>
        <div class="product-price">$899.99</div>
        <button class="btn-add-to-cart">Add to Cart</button>
      </div>
    </div>

    <!-- Product Card 2: Inline CSS -->
    <div style="background-color: white; border-radius: 8px; box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1); overflow: hidden; max-width: 300px; transition: transform 0.3s ease, box-shadow 0.3s ease;">
      <img 
        src="https://via.placeholder.com/300x250?text=Smartphone" 
        alt="Smartphone" 
        style="width: 100%; height: 250px; object-fit: cover;"
      />
      <div style="padding: 20px;">
        <div style="font-size: 20px; font-weight: bold; color: #333; margin-bottom: 10px;">Smartphone</div>
        <div style="font-size: 14px; color: #666; margin-bottom: 15px;">Latest 5G smartphone with great camera</div>
        <div style="font-size: 24px; font-weight: bold; color: #27ae60; margin-bottom: 15px;">$599.99</div>
        <button style="width: 100%; padding: 12px; background-color: #3498db; color: white; border: none; border-radius: 5px; font-size: 16px; font-weight: bold; cursor: pointer;">Add to Cart</button>
      </div>
    </div>

    <!-- Product Card 3: External CSS -->
    <div class="product-card">
      <img 
        src="https://via.placeholder.com/300x250?text=Headphones" 
        alt="Headphones" 
        class="product-image"
      />
      <div class="product-details">
        <div class="product-title">Headphones</div>
        <div class="product-description">Noise-cancelling wireless headphones</div>
        <div class="product-price">$199.99</div>
        <button class="btn-add-to-cart">Add to Cart</button>
      </div>
    </div>
  </div>
</body>
</html>
