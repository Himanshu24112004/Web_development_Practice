<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Product Table</title>
</head>
<body>
  <h1>Product List</h1>
  
  <table border="1">
    <thead>
      <tr>
        <th>Product Name</th>
        <th>Price ($)</th>
        <th>Rating (out of 5)</th>
      </tr>
    </thead>

    <tbody>
      <tr>
        <td>Laptop</td>
        <td>899.99</td>
        <td>4.5</td>
      </tr>
      <tr>
        <td>Wireless Mouse</td>
        <td>29.99</td>
        <td>4.8</td>
      </tr>
      <tr>
        <td>USB-C Cable</td>
        <td>12.99</td>
        <td>4.2</td>
      </tr>
    </tbody>

    <tfoot>
      <tr>
        <td colspan="3">Total Products: 3</td>
      </tr>
    </tfoot>
  </table>
</body>
</html>
