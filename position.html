<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        div {
            border: 1px solid black;
            padding: 10px;
            margin: 10px;
        }
        .relative{
            position: relative;
            top: 20px;
            left: 30px;
        }
        .absolute {
            position: absolute;
            top: 50px;
            left: 50px;
            background-color: pink;
            padding: 10px;
        }
        .fixed {
            position: fixed;
            top: 10px;
            right: 10px;
            background-color: lightgreen;
            padding: 20px;
            border: 2px solid black;
        }
        
    </style>
</head>
<body>
    <div class="static"> static hu mai !!!!!</div>
    <div class="relative"> does not move in relation ******</div>
    <div class="fixed"> mai fix kr deta hu !!!!!!  </div>
    <div class="absolute"> me  absolute hu yar !!!!!!!!!! </div>
</body>
</html>
