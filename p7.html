<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Navigation Bar</title>
  <style>
    /* CSS code from above */
    .navbar {
      background-color: #2c3e50;
      padding: 15px 30px;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-list {
      list-style: none;
      display: flex;
      gap: 40px;
      margin: 0;
      padding: 0;
    }

    .nav-list a {
      color: #ecf0f1;
      text-decoration: none;
      font-size: 18px;
      font-weight: 500;
      padding: 10px 20px;
      border-radius: 5px;
      background-color: #2c3e50;
      transition: background-color 0.3s ease, color 0.3s ease;
      display: inline-block;
    }

    .nav-list a:hover {
      background-color: #3498db;
      color: white;
    }

    .nav-list a.active {
      background-color: #e74c3c;
      color: white;
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <ul class="nav-list">
      <li><a href="#home" class="active">Home</a></li>
      <li><a href="#about">About</a></li>
      <li><a href="#services">Services</a></li>
      <li><a href="#portfolio">Portfolio</a></li>
      <li><a href="#contact">Contact</a></li>
    </ul>
  </nav>

  <main>
    <h1>Welcome to the Website</h1>
    <p>Hover over the navigation items to see the smooth background color transition.</p>
  </main>
</body>
</html>
