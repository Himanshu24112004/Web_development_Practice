<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic To-Do List</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 500px; margin: 50px auto; padding: 20px; }
        input[type="text"] { width: 70%; padding: 10px; font-size: 16px; }
        button { padding: 10px 15px; font-size: 16px; margin-left: 5px; }
        .task { padding: 10px; margin: 5px 0; background: #f5f5f5; display: flex; align-items: center; }
        .task.completed { text-decoration: line-through; opacity: 0.6; }
        .task input[type="checkbox"] { margin-right: 10px; }
        .delete-btn { margin-left: auto; background: #ff4444; color: white; border: none; padding: 5px 10px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>To-Do List</h1>
    <div>
        <input type="text" id="taskInput" placeholder="Enter a task..." maxlength="100">
        <button onclick="addTask()">Add Task</button>
    </div>
    <ul id="taskList"></ul>

    <script>
        // Get DOM elements
        const taskInput = document.getElementById('taskInput');
        const taskList = document.getElementById('taskList');

        // Add task function using DOM manipulation
        function addTask() {
            const taskText = taskInput.value.trim();
            if (taskText === '') return;

            // Create new task element
            const li = document.createElement('li');
            li.className = 'task';
            li.innerHTML = `
                <input type="checkbox" onchange="toggleTask(this)">
                <span>${escapeHtml(taskText)}</span>
                <button class="delete-btn" onclick="deleteTask(this)">Delete</button>
            `;
            
            // Add to list
            taskList.appendChild(li);
            
            // Clear input
            taskInput.value = '';
            taskInput.focus();
        }

        // Toggle task completion
        function toggleTask(checkbox) {
            const task = checkbox.parentElement;
            task.classList.toggle('completed');
        }

        // Delete task
        function deleteTask(button) {
            const task = button.parentElement;
            task.remove();
        }

        // Handle Enter key
        taskInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') addTask();
        });

        // XSS protection
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
