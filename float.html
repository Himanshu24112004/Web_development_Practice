<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            display: inline;
            margin: auto;
        }
        .left {
            float: left;
            width: 50px;
            height: 50px;
            background-color: rgb(10, 174, 228);
        }
        .right {
            float: right;
            width: 50px;
            height: 50px;
            background-color: rgb(182, 15, 129);
        }
        .inherit {
            float: inherit;
            width: 50px;
            height: 60px;
            background-color: rgb(12, 42, 239);
        }
         .none {
            float: none;
            width: 50px;
            background-color: rgb(9, 244, 36);
        }
        
    </style>
</head>
<body>
    <div class="left"> float left used </div>
    <div class="right"> float right used </div>
    <div class="none">float none used </div>
    <div class="inherit"> float inherit used </div>


    
    
</body>
</html>
