<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLIP CSS</title>
    <style> 
        .front-page{
            margin: auto;
            width: 360px;
            height: 530px;
            perspective: 1000px; /* Creates 3D space */
            cursor: pointer;
        }
        
        .card-info{
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.8s ease-in-out;
            border-radius: 15px;
        }
        
        /* Hover on container triggers card flip */
        .front-page:hover .card-info{
            transform: rotateY(180deg);
        }
        
        /* Both faces positioned absolutely */
        .card-front, .card-back{
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden; /* Hide back when facing away */
            border-radius: 15px;
            box-shadow: 5px 5px 10px rgba(0, 0, 0, 0.2);
        }
        
        /* Front face styling */
        .card-front{
            background: white;
        }
        
        .card-front img{
            width: 100%;
            height: 100%;
            border-radius: 15px;
            object-fit: cover;
        }
        
        /* Back face - rotated 180deg by default */
        .card-back{
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            transform: rotateY(180deg);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        h2{
            text-align: center;
            margin: 20px 0;
        }
        
        .btn{
            padding: 12px 24px;
            border-radius: 10px;
            border: none;
            background-color: rgb(4, 184, 244);
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }
        
        .btn:hover{
            background-color: rgb(3, 150, 200);
        }
    </style>
</head>
<body>
    <div class="front-page">        
        <div class="card-info">
            <!-- Front Face -->
            <div class="card-front">
                <img src="Picsart_24-08-16_20-19-31-730.jpg" alt="Himanshu Kumar">
            </div>
            
            <!-- Back Face -->
            <div class="card-back">
                <h2>Himanshu Kumar</h2>
                <p>Computer Science Student</p>
                <p>Web Developer | Programmer</p>
                <button class="btn">Explore Profile</button>
            </div>
        </div>
    </div>
</body>
</html>
