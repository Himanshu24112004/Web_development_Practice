<!DOCTYPE html>
<html lang="en">
<head>
    <title>image tansition</title>
    <style>
        body{
            padding: auto;
            margin: auto ;
        }
        .div{
            width: 100%;
            height: 100vh;
            background-position: center;
            background-repeat: no-repeat;
            background-size: 100% 100%;
            box-shadow: 20px 20px 10px gray;
            animation: slider 36s linear infinite;
        }
        @keyframes slider {
            0%{background-image: url(HIMANSHU_KUMAR_10585/img1.jpg);
            opacity: 1;
        }
            10%{background-image: url(HIMANSHU_KUMAR_10585/img2.jpg);
            opacity: 1;
        }
            20%{background-image: url(HIMANSHU_KUMAR_10585/img3.jpg);
            opacity: 1;
        }
            100%{background-image: url(HIMANSHU_KUMAR_10585/img4.jpg);
            opacity: 1;
        }
            
          }
    
    </style>
</head>
<body>
    <div class="div"></div>
</body>
</html>
